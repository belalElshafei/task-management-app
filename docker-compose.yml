services:
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      network: host
    ports:
      - "5000:5000"
    env_file:
      - ./apps/backend/.env
    depends_on:
      - mongo
      - redis
    networks:
      - task-network
    restart: always

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
      network: host
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - task-network
    restart: always

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - task-network
    restart: always

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - task-network
    restart: always

networks:
  task-network:
    driver: bridge

volumes:
  mongo-data:
